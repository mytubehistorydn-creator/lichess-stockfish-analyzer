<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lichess Analyzer Popup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .header {
            background-color: #4CAF50;
            color: white;
            padding: 10px 0;
            text-align: center;
        }
        .content {
            margin-top: 20px;
        }
        .btn {
            background-color: #008CBA;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #005f6b;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Lichess Analyzer</h1>
    </div>
    <div class="content">
        <p>Analyze your chess games and improve your skills with the Lichess Analyzer.</p>
        <button class="btn">Analyze Game</button>
    </div>
</body>
</html>
